[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/agreements/*"
  to = "/.netlify/functions/public-agreement-pdf?slug=:splat"
  status = 200
  force = true

[[redirects]]
  from = "/venue-email-ack/*"
  to = "/.netlify/functions/venue-email-ack?token=:splat"
  status = 200
  force = true

[functions]
  node_bundler = "esbuild"
