[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Requires SUPABASE_SERVICE_ROLE_KEY (and Supabase URL/anon) for public-agreement-pdf — see netlify/functions/supabaseServerEnv.
[[redirects]]
  from = "/agreements/*"
  to = "/.netlify/functions/public-agreement-pdf?slug=:splat"
  status = 200
  force = true

[[redirects]]
  from = "/venue-email-ack/*"
  to = "/.netlify/functions/venue-email-ack?token=:splat"
  status = 200
  force = true

[functions]
  node_bundler = "esbuild"

# Process email queue every minute — sends pending venue_emails that have passed their buffer / schedule.
[[schedule]]
  cron = "* * * * *"
  function = "process-email-queue"

# Hourly :05 UTC — handler only enqueues when America/Los_Angeles is Sunday 5:00.
[[schedule]]
  cron = "5 * * * *"
  function = "enqueue-gig-calendar-digest"

# Every 12 minutes — import shared Google calendars + dedup scan (see docs/CRON_FIX_HANDOFF.md for external cron fallback).
[[schedule]]
  cron = "*/12 * * * *"
  function = "google-calendar-background-sync"
